<form method="POST">

    <h3>Компания</h3>

    <input name="name" placeholder="Название" required><br>
    <input name="director" placeholder="ФИО директора"><br>
    <input name="bin" placeholder="БИН / ИИН"><br>
    <input name="address" placeholder="Адрес"><br>
    <input name="phone" placeholder="Телефон"><br>
    <input name="iik" placeholder="ИИК (IBAN)"><br>
    <input name="bik" placeholder="БИК"><br>
    <input name="bank" placeholder="Банк"><br>
    <input name="kbe" placeholder="КБЕ"><br>
    <input name="knp" placeholder="КНП"><br>

    <h3>Аккаунт</h3>

    <input name="username" placeholder="Логин" required><br>
    <input name="password" type="password" placeholder="Пароль" required><br>

    <button type="submit">Зарегистрироваться</button>

</form>
