<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход — Nika Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;

    background: linear-gradient(135deg, #0f172a, #1e3a8a);

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.login-box {
    width: 100%;
    max-width: 390px;
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(226,232,240,0.9);
    border-radius: 24px;
    padding: 34px;
    box-shadow: 0 25px 70px rgba(15,23,42,0.12);
}

.logo {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 8px;
}

.logo span {
    color: #3b82f6;
}

h2 {
    margin: 0 0 8px;
    text-align: center;
    font-size: 26px;
    color: #0f172a;
}

.subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 26px;
}

input {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    margin-bottom: 14px;
    border-radius: 14px;
    border: 1px solid #dbe2ea;
    background: #ffffff;
    color: #0f172a;
    font-size: 15px;
    outline: none;
    transition: 0.2s;
}

input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
}

button {
    width: 100%;
    height: 50px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(59,130,246,0.28);
}

.error {
    background: #fee2e2;
    color: #b91c1c;
    padding: 10px 12px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 16px;
    font-size: 14px;
}

.note {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
    color: #64748b;
}

.note a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 700;
}

.back-link {
    display: block;
    margin-top: 14px;
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
    text-decoration: none;
}
</style>
</head>

<body>

<form method="POST" class="login-box">
    <div class="logo">Nika <span>Business</span></div>

    <h2>Вход в систему</h2>
    <div class="subtitle">Введите логин и пароль для продолжения</div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <input name="username" placeholder="Логин" required>
    <input name="password" type="password" placeholder="Пароль" required>

    <button type="submit">Войти</button>

    <div class="note">
        Нет аккаунта? <a href="/register">Создать компанию</a>
    </div>

    <a href="/" class="back-link">← На главную</a>
</form>

</body>
</html>
