<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            width: 360px;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }
        input, button, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #dbe2ea;
            box-sizing: border-box;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }
        .error {
            color: #dc2626;
            margin-bottom: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <form method="POST" class="login-box">
        <h2>Вход в систему</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <input name="username" placeholder="Логин" required>
        <input name="password" type="password" placeholder="Пароль" required>

        <button type="submit">Войти</button>
    </form>
</body>
</html>
