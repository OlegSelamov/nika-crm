<!DOCTYPE html>
<html>
<head>
    <title>Nika Business</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            text-align: center;
        }

        .container {
            padding: 100px 20px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 18px;
            color: #cbd5f5;
        }

        .buttons {
            margin-top: 30px;
        }

        a {
            text-decoration: none;
            padding: 15px 25px;
            margin: 10px;
            display: inline-block;
            border-radius: 10px;
            font-weight: bold;
        }

        .login {
            background: white;
            color: black;
        }

        .register {
            background: #6366f1;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Nika Business CRM</h1>
    <p>Управление клиентами, продажами и бизнесом в одном месте</p>

    <div class="buttons">
        <a href="/login" class="login">Войти</a>
        <a href="/register" class="register">Создать компанию</a>
    </div>
</div>

</body>
</html>
